name: matds
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11

  # Compatibility fixes
  - setuptools==69.5.1
  - wheel

  # Numerical & Data Analysis
  - numpy>=1.21
  - pandas>=1.3
  - scipy>=1.7
  - scikit-learn>=1.0

  # Visualization
  - matplotlib>=3.4
  - seaborn>=0.11

  # Jupyter & Notebooks
  - jupyter>=1.0
  - jupyterlab>=3.0
  - ipython>=7.0
  - ipywidgets>=7.6

  # Materials Science — Core
  - pymatgen>=2022.12

  # Type hints & compatibility (required for Python 3.11 with some packages)
  - typing_extensions>=4.0

  # File & Environment Management
  - pip>=21.0

  # pip packages (not available on conda-forge)
  - pip:
    # Materials Data APIs
    - mp-api>=0.33
    - jarvis-tools>=2022.12
    - matminer>=0.9.0

    # Configuration & Environment
    - python-dotenv>=0.19

    # ML & Interpretation (Weeks 9-12)
    - umap-learn>=0.5
    - shap>=0.42
    - xgboost>=1.7

    # Visualization
    - plotly>=5.0

    # PyTorch Geometric — installed separately in Week 12
    # See SETUP.md for instructions
